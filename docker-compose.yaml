services:
  backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: DockerFile
    env_file:
      - ./web/.env
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend_node_modules:
  web_node_modules:
